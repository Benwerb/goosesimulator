<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sara and Nathan Goose Brigade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; overflow: hidden; width: 100vw; height: 100vh; }
    #title {
      position: fixed;
      top: 18px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      user-select: none;
    }
    h1 {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive;
      font-size: clamp(1.6rem, 5vw, 3.8rem);
      color: #FF6600;
      text-shadow: 3px 3px 0 #FFD700, 6px 6px 0 rgba(0,0,0,0.12);
      display: inline-block;
      animation: wobble 2.5s ease-in-out infinite;
    }
    @keyframes wobble {
      0%   { transform: rotate(-1.5deg) translateY(0px); }
      25%  { transform: rotate(0deg)    translateY(-5px); }
      50%  { transform: rotate(1.5deg)  translateY(0px); }
      75%  { transform: rotate(0deg)    translateY(5px); }
      100% { transform: rotate(-1.5deg) translateY(0px); }
    }
    canvas { display: block; position: fixed; top: 0; left: 0; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="title">
    <h1>&#x1FAA2; Sara &amp; Nathan Goose Brigade &#x1FAA2;</h1>
  </div>

  <script>
  (function () {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    /* ---- HONK particles ---- */
    const HONKS = ['HONK!', 'HONK!!', 'HONK!!!!', 'H O N K', 'honk.', 'HONK?!', '*HONK*', 'beep.', 'HONNK'];

    class Honk {
      constructor(x, y) {
        this.x  = x + (Math.random() - 0.5) * 30;
        this.y  = y;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = -1 - Math.random() * 1.5;
        this.alpha = 1;
        this.text  = HONKS[Math.floor(Math.random() * HONKS.length)];
        this.size  = 13 + Math.random() * 13;
        this.hue   = 10 + Math.random() * 35;
      }
      update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.018; }
      dead()   { return this.alpha <= 0; }
      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.font        = `bold ${this.size}px "Comic Sans MS", cursive`;
        ctx.textAlign   = 'center';
        ctx.lineWidth   = 4;
        ctx.strokeStyle = 'white';
        ctx.fillStyle   = `hsl(${this.hue}, 100%, 42%)`;
        ctx.strokeText(this.text, this.x, this.y);
        ctx.fillText  (this.text, this.x, this.y);
        ctx.restore();
      }
    }

    /* ---- Goose drawing ---- */
    function drawGoose(ctx, frame, speed) {
      const bob      = Math.sin(frame * 2.5) * (2 + speed * 0.35);
      const legA     = Math.sin(frame * 2.5) * 15;
      const legB     = Math.sin(frame * 2.5 + Math.PI) * 15;
      const wingFlap = Math.sin(frame * 1.5) * 0.13;

      ctx.translate(0, bob);

      /* shadow */
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.07)';
      ctx.beginPath();
      ctx.ellipse(0, 30, 20, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      /* legs */
      ctx.save();
      ctx.strokeStyle = '#FF8C00';
      ctx.lineCap     = 'round';

      function drawLeg(hipX, swing) {
        const fx = hipX + swing;
        ctx.lineWidth = 4.5;
        ctx.beginPath();
        ctx.moveTo(hipX, 18);
        ctx.lineTo(fx, 33);
        ctx.stroke();
        // three toes
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(fx, 33); ctx.lineTo(fx + 11, 33);
        ctx.moveTo(fx, 33); ctx.lineTo(fx + 6,  38);
        ctx.moveTo(fx, 33); ctx.lineTo(fx - 1,  38);
        ctx.stroke();
      }
      drawLeg(-7, legA);
      drawLeg( 5, legB);
      ctx.restore();

      /* body */
      ctx.fillStyle   = 'white';
      ctx.strokeStyle = '#E0E0E0';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.ellipse(0, 3, 27, 19, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      /* tail feathers */
      ctx.fillStyle   = '#F0F0F0';
      ctx.strokeStyle = '#CCCCCC';
      ctx.lineWidth   = 1.5;
      for (let i = 0; i < 2; i++) {
        ctx.beginPath();
        ctx.moveTo(22, -4 + i * 4);
        ctx.lineTo(40, -20 + i * 6);
        ctx.lineTo(36,  6 - i * 2);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      }

      /* wing */
      ctx.save();
      ctx.translate(2, 4);
      ctx.rotate(wingFlap);
      ctx.fillStyle   = '#F5F5F5';
      ctx.strokeStyle = '#DDDDDD';
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, 0, 21, 12, -0.1, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#E0E0E0';
      ctx.lineWidth   = 1;
      for (let i = 1; i <= 4; i++) {
        ctx.beginPath();
        ctx.moveTo(-18 + i * 9, -10);
        ctx.lineTo(-20 + i * 9,  10);
        ctx.stroke();
      }
      ctx.restore();

      /* neck */
      ctx.fillStyle   = 'white';
      ctx.strokeStyle = '#E0E0E0';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.moveTo(-15, -11);
      ctx.bezierCurveTo(-28, -26, -22, -50, -10, -54);
      ctx.bezierCurveTo(-2,  -57,   4, -50,   2, -36);
      ctx.bezierCurveTo( 0,  -24,  -5, -15, -15, -11);
      ctx.fill(); ctx.stroke();

      /* head */
      ctx.fillStyle   = 'white';
      ctx.strokeStyle = '#E0E0E0';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.arc(-7, -57, 14, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      /* beak */
      ctx.fillStyle   = '#FF8C00';
      ctx.strokeStyle = '#DD6600';
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      ctx.moveTo(5, -63);
      ctx.lineTo(28, -57);
      ctx.lineTo(5, -51);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#CC5500';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(5, -57); ctx.lineTo(28, -57);
      ctx.stroke();
      ctx.fillStyle = '#CC5500';
      ctx.beginPath();
      ctx.ellipse(15, -61, 2, 1.5, 0.2, 0, Math.PI * 2);
      ctx.fill();

      /* eye */
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(-3, -60, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(-1, -62, 2, 0, Math.PI * 2);
      ctx.fill();

      /* eyebrow — raised & worried */
      ctx.strokeStyle = '#444';
      ctx.lineWidth   = 2.5;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(-11, -68);
      ctx.quadraticCurveTo(-4, -72, 3, -68);
      ctx.stroke();

      /* blush */
      ctx.fillStyle = 'rgba(255,90,90,0.28)';
      ctx.beginPath();
      ctx.ellipse(-3, -53, 6, 3.5, 0.2, 0, Math.PI * 2);
      ctx.fill();
    }

    /* ---- Goose entity ---- */
    class Goose {
      constructor(label) {
        this.label = label || null;
        this.size  = label ? 1.3 : (0.65 + Math.random() * 0.65);
        this.x = 100 + Math.random() * (canvas.width  - 200);
        this.y = 100 + Math.random() * (canvas.height - 200);
        this.speed = 2 + Math.random() * 3.5;
        const a = Math.random() * Math.PI * 2;
        this.vx = Math.cos(a) * this.speed;
        this.vy = Math.sin(a) * this.speed;
        this.frame      = Math.random() * Math.PI * 2;
        this.honkTimer  = Math.floor(Math.random() * 180);
        this.panicLeft  = 0;
      }

      update(honks) {
        this.frame += 0.2 + this.speed * 0.03;
        this.honkTimer--;

        if (this.honkTimer <= 0) {
          honks.push(new Honk(this.x, this.y - 70 * this.size));
          this.honkTimer = 80 + Math.floor(Math.random() * 220);
          this.panicLeft = 25 + Math.floor(Math.random() * 35);
        }

        if (this.panicLeft > 0) {
          this.panicLeft--;
          if (this.panicLeft % 6 === 0) {
            const a = Math.random() * Math.PI * 2;
            this.speed = 4.5 + Math.random() * 5;
            this.vx = Math.cos(a) * this.speed;
            this.vy = Math.sin(a) * this.speed;
          }
        } else {
          this.speed = this.speed * 0.99 + (2 + Math.random() * 3.5) * 0.01;
        }

        if (Math.random() < 0.015) {
          this.vx += (Math.random() - 0.5) * 2;
          this.vy += (Math.random() - 0.5) * 2;
          const m = Math.sqrt(this.vx * this.vx + this.vy * this.vy) || 1;
          this.vx = this.vx / m * this.speed;
          this.vy = this.vy / m * this.speed;
        }

        this.x += this.vx;
        this.y += this.vy;

        const pad = 55 * this.size;
        if (this.x < pad)                    { this.x = pad;                    this.vx =  Math.abs(this.vx); }
        if (this.x > canvas.width  - pad)    { this.x = canvas.width  - pad;    this.vx = -Math.abs(this.vx); }
        if (this.y < pad)                    { this.y = pad;                    this.vy =  Math.abs(this.vy); }
        if (this.y > canvas.height - pad)    { this.y = canvas.height - pad;    this.vy = -Math.abs(this.vy); }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.size, this.size);
        const flip = this.vx < 0;
        if (flip) ctx.scale(-1, 1);

        drawGoose(ctx, this.frame, this.speed);

        if (this.label) {
          ctx.save();
          if (flip) ctx.scale(-1, 1);
          ctx.font        = 'bold 15px "Comic Sans MS", cursive';
          ctx.textAlign   = 'center';
          ctx.lineWidth   = 3;
          ctx.strokeStyle = 'white';
          ctx.fillStyle   = '#FF6600';
          ctx.strokeText(this.label, 0, 52);
          ctx.fillText  (this.label, 0, 52);
          ctx.restore();
        }

        ctx.restore();
      }
    }

    /* ---- setup ---- */
    const geese = [new Goose('Sara'), new Goose('Nathan')];
    for (let i = 0; i < 10; i++) geese.push(new Goose());

    const honks = [];

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      geese.forEach(g => { g.update(honks); g.draw(); });
      for (let i = honks.length - 1; i >= 0; i--) {
        honks[i].update();
        honks[i].draw();
        if (honks[i].dead()) honks.splice(i, 1);
      }
      requestAnimationFrame(loop);
    }

    loop();
  })();
  </script>
</body>
</html>
